<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ログイン｜掲示板</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic UI", sans-serif;
      background: #f5f5f5;
      color: #333;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: #4f46e5;
      color: #fff;
      padding: 16px 24px;
      font-size: 1.2rem;
      font-weight: bold;
      box-shadow: 0 2px 6px rgba(0,0,0,0.15);
    }

    header a {
      color: #fff;
      text-decoration: none;
      opacity: 0.85;
      font-size: 0.85rem;
      margin-left: 14px;
      font-weight: normal;
    }
    header a:hover { opacity: 1; }

    .center {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 16px;
    }

    .card {
      background: #fff;
      border-radius: 14px;
      padding: 32px 28px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.1);
      width: 100%;
      max-width: 400px;
    }

    /* タブ */
    .auth-tabs {
      display: flex;
      margin-bottom: 24px;
      border-bottom: 2px solid #eee;
    }

    .tab-btn {
      flex: 1;
      padding: 10px;
      border: none;
      background: none;
      font-size: 1rem;
      font-weight: 600;
      color: #999;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      margin-bottom: -2px;
      transition: color 0.2s, border-color 0.2s;
    }
    .tab-btn.active {
      color: #4f46e5;
      border-bottom-color: #4f46e5;
    }

    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* フォーム */
    .form-group { margin-bottom: 16px; }

    label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      color: #555;
      margin-bottom: 6px;
    }

    input[type="email"],
    input[type="password"] {
      width: 100%;
      padding: 11px 13px;
      border: 1.5px solid #ddd;
      border-radius: 8px;
      font-size: 0.95rem;
      font-family: inherit;
      background: #fafafa;
      transition: border-color 0.2s;
    }

    input:focus {
      outline: none;
      border-color: #4f46e5;
      background: #fff;
    }

    .btn-primary {
      width: 100%;
      padding: 12px;
      background: #4f46e5;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.2s, opacity 0.2s;
      margin-top: 4px;
    }
    .btn-primary:hover { background: #4338ca; }
    .btn-primary:disabled { opacity: 0.55; cursor: not-allowed; }

    .status-msg {
      font-size: 0.85rem;
      margin-top: 12px;
      text-align: center;
      min-height: 1.2em;
    }
    .status-msg.ok  { color: #16a34a; }
    .status-msg.err { color: #dc2626; }
  </style>
</head>
<body>

<header>
  📌 掲示板
  <a href="index.html">← 掲示板に戻る</a>
</header>

<div class="center">
  <div class="card">

    <div class="auth-tabs">
      <button class="tab-btn active" data-tab="login">ログイン</button>
      <button class="tab-btn"        data-tab="signup">新規登録</button>
    </div>

    <!-- ログイン -->
    <div class="tab-panel active" id="panel-login">
      <div class="form-group">
        <label for="login-email">メールアドレス</label>
        <input type="email" id="login-email" placeholder="example@mail.com">
      </div>
      <div class="form-group">
        <label for="login-password">パスワード</label>
        <input type="password" id="login-password" placeholder="••••••••">
      </div>
      <button class="btn-primary" id="btn-login">ログイン</button>
      <p class="status-msg" id="login-status"></p>
    </div>

    <!-- 新規登録 -->
    <div class="tab-panel" id="panel-signup">
      <div class="form-group">
        <label for="signup-email">メールアドレス</label>
        <input type="email" id="signup-email" placeholder="example@mail.com">
      </div>
      <div class="form-group">
        <label for="signup-password">パスワード（6文字以上）</label>
        <input type="password" id="signup-password" placeholder="••••••••">
      </div>
      <button class="btn-primary" id="btn-signup">新規登録</button>
      <p class="status-msg" id="signup-status"></p>
    </div>

  </div>
</div>

<script type="module">
  import { createClient } from 'https://esm.sh/@supabase/supabase-js@2'

  const SUPABASE_URL  = 'https://rppnoygstaoqhcetvkyu.supabase.co'
  const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJwcG5veWdzdGFvcWhjZXR2a3l1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE5MjYwNzUsImV4cCI6MjA5NzUwMjA3NX0.KMaTKUllWeAzrgjvF5eA0s0GYhWtPDN-34u0NXTRUqQ'

  const supabase = createClient(SUPABASE_URL, SUPABASE_ANON)

  /* ===== ログイン済みなら掲示板へリダイレクト ===== */
  const { data: { session } } = await supabase.auth.getSession()
  if (session) location.href = 'index.html'

  /* ===== タブ切替 ===== */
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'))
      document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'))
      btn.classList.add('active')
      document.getElementById('panel-' + btn.dataset.tab).classList.add('active')
    })
  })

  /* ===== ログイン ===== */
  document.getElementById('btn-login').addEventListener('click', async () => {
    const email    = document.getElementById('login-email').value.trim()
    const password = document.getElementById('login-password').value
    const status   = document.getElementById('login-status')

    if (!email || !password) { setMsg(status, 'メールとパスワードを入力してください', 'err'); return }

    document.getElementById('btn-login').disabled = true
    setMsg(status, 'ログイン中…', '')

    const { error } = await supabase.auth.signInWithPassword({ email, password })

    if (error) {
      setMsg(status, `エラー: ${error.message}`, 'err')
      document.getElementById('btn-login').disabled = false
    } else {
      setMsg(status, 'ログインしました。移動します…', 'ok')
      setTimeout(() => { location.href = 'index.html' }, 800)
    }
  })

  /* ===== 新規登録 ===== */
  document.getElementById('btn-signup').addEventListener('click', async () => {
    const email    = document.getElementById('signup-email').value.trim()
    const password = document.getElementById('signup-password').value
    const status   = document.getElementById('signup-status')

    if (!email || !password) { setMsg(status, 'メールとパスワードを入力してください', 'err'); return }

    document.getElementById('btn-signup').disabled = true
    setMsg(status, '登録中…', '')

    const { error } = await supabase.auth.signUp({ email, password })

    if (error) {
      setMsg(status, `エラー: ${error.message}`, 'err')
    } else {
      setMsg(status, '確認メールを送信しました。メールをご確認ください。', 'ok')
    }
    document.getElementById('btn-signup').disabled = false
  })

  /* ===== ユーティリティ ===== */
  function setMsg(el, msg, cls) {
    el.textContent = msg
    el.className   = `status-msg ${cls}`
  }
</script>

</body>
</html>
